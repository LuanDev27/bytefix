<script>
// Congela os contadores animados do site no valor final (para o screenshot)
var f=document.querySelector('iframe');
f.addEventListener('load',function(){
  var d=f.contentDocument; if(!d) return;
  d.querySelectorAll('[data-count]').forEach(function(el){
    var p=el.getAttribute('data-prefix')||'', s=el.getAttribute('data-suffix')||'';
    var fin=p+el.getAttribute('data-count')+s;
    var set=function(){ if(el.textContent!==fin) el.textContent=fin; };
    set();
    new MutationObserver(set).observe(el,{childList:true,characterData:true,subtree:true});
  });
});
</script>
